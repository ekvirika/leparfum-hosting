<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Parfum - The Complete Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; background-color: #050505; color: #fff; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .gold-text {
            background: linear-gradient(45deg, #d4af37, #f9f295, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .product-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .product-card:hover { border-color: rgba(212, 175, 55, 0.3); transform: translateY(-8px); }
        .search-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .search-input:focus { background: rgba(255,255,255,0.07); border-color: #d4af37; outline: none; }
        .sticky-nav { backdrop-filter: blur(20px); background: rgba(5, 5, 5, 0.8); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .filter-btn { transition: all 0.3s; border-bottom: 2px solid transparent; }
        .filter-btn.active { color: #d4af37; border-color: #d4af37; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 sticky-nav px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-widest gold-text uppercase">Le Parfum</a>
            <div class="hidden md:flex space-x-8 text-[10px] uppercase tracking-widest text-neutral-400">
                <a href="#" class="hover:text-white">Collection</a>
                <a href="#" class="hover:text-white">Contact</a>
            </div>
            <div class="flex items-center space-x-4">
                <i data-lucide="search" class="w-5 h-5 text-neutral-400 cursor-pointer hover:text-white"></i>
                <i data-lucide="shopping-bag" class="w-5 h-5 text-neutral-400 cursor-pointer hover:text-white"></i>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-20 pb-10 px-6">
        <div class="max-w-7xl mx-auto text-center space-y-6">
            <span class="text-[10px] uppercase tracking-[0.5em] text-yellow-600 font-semibold">Salys Endorphines Catalog</span>
            <h1 class="text-5xl md:text-7xl">სრული კოლექცია</h1>
            <div class="max-w-2xl mx-auto pt-8">
                <input type="text" id="searchInput" placeholder="მოძებნე სუნამო..." class="search-input w-full px-8 py-4 rounded-full text-center text-lg">
            </div>
        </div>
    </header>

    <!-- Brands Filter (Simple) -->
    <div class="max-w-7xl mx-auto px-6 py-4 overflow-x-auto">
        <div class="flex justify-center space-x-8 min-w-max pb-4">
            <button class="filter-btn active text-[10px] uppercase tracking-widest font-semibold" onclick="filterBrand('all')">ყველა</button>
            <button class="filter-btn text-[10px] uppercase tracking-widest" onclick="filterBrand('Dior')">Dior</button>
            <button class="filter-btn text-[10px] uppercase tracking-widest" onclick="filterBrand('Prada')">Prada</button>
            <button class="filter-btn text-[10px] uppercase tracking-widest" onclick="filterBrand('YSL')">YSL</button>
            <button class="filter-btn text-[10px] uppercase tracking-widest" onclick="filterBrand('Chanel')">Chanel</button>
            <button class="filter-btn text-[10px] uppercase tracking-widest" onclick="filterBrand('Armani')">Armani</button>
        </div>
    </div>

    <!-- Collection Grid -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-12">
            <!-- Products are generated via JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-32 py-20 bg-neutral-900 px-6 border-t border-white/5 text-center">
        <div class="max-w-7xl mx-auto space-y-8">
            <h3 class="text-2xl gold-text uppercase tracking-widest">Le Parfum</h3>
            <p class="text-neutral-500 text-xs uppercase tracking-[0.2em]">&copy; 2026 Leparfum.ge. All Rights Reserved.</p>
        </div>
    </footer>

    <script id="productData" type="application/json">
        // JSON injection from shell script
    </script>

    <script>
        // We'll replace this part with the actual data
        let products = [];
        
        async function init() {
            // Load the full product list
            const response = await fetch('all_products.json');
            products = await response.json();
            renderProducts(products);
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = productsToRender.map(p => `
                <div class="product-card group p-4 space-y-4">
                    <div class="aspect-[1/1] overflow-hidden bg-neutral-900 relative">
                        <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=1000'">
                    </div>
                    <div class="space-y-1">
                        <p class="text-[9px] uppercase tracking-[0.2em] text-yellow-600 font-bold">${p.brand}</p>
                        <h3 class="text-[11px] md:text-sm font-medium uppercase tracking-wider truncate">${p.name}</h3>
                        <p class="text-[9px] text-neutral-500 italic">${p.size}</p>
                        <div class="flex justify-between items-center pt-2">
                            <span class="text-xs font-light tracking-widest">₾${p.price}</span>
                            <a href="https://wa.me/yournumber" class="text-[8px] uppercase tracking-widest border-b border-neutral-800 pb-1 hover:border-yellow-600">Inquire</a>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterBrand(brand) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(brand === 'all') {
                renderProducts(products);
            } else {
                const filtered = products.filter(p => 
                    p.brand.toLowerCase().includes(brand.toLowerCase()) || 
                    p.name.toLowerCase().includes(brand.toLowerCase())
                );
                renderProducts(filtered);
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.brand.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        });

        init();
    </script>
</body>
</html>
