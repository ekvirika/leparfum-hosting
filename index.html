<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leparfum.ge - მალე დავბრუნდებით</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
        .gold-gradient {
            background: linear-gradient(45deg, #d4af37, #f9f295, #d4af37, #b38728, #f9f295);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-neutral-900 text-white min-h-screen flex flex-col items-center justify-center p-6">
    <div class="max-w-2xl text-center space-y-8 animate-fade-in">
        <!-- Logo -->
        <div class="mb-12">
            <h1 class="text-5xl md:text-7xl font-bold tracking-widest uppercase gold-gradient">Le Parfum</h1>
            <div class="h-px w-24 bg-yellow-600 mx-auto mt-4"></div>
        </div>

        <h2 class="text-2xl md:text-3xl font-light tracking-wide text-neutral-300">
            ჩვენი ონლაინ მაღაზია მალე გაიხსნება
        </h2>
        
        <p class="text-neutral-500 font-light leading-relaxed">
            ჩვენ ვქმნით განსაკუთრებულ სივრცეს პარფიუმერიის მოყვარულთათვის. <br>
            სულ მალე შეძლებთ საუკეთესო სურნელების აღმოჩენას.
        </p>

        <!-- Status -->
        <div class="py-12 border-y border-neutral-800 my-12">
            <span class="text-xs uppercase tracking-[0.3em] text-yellow-600 font-bold mb-4 block">Coming Soon / მალე</span>
            <div class="flex justify-center space-x-8 text-neutral-400">
                <div class="flex flex-col items-center">
                    <span class="text-sm font-medium">სურნელი</span>
                </div>
                <div class="text-neutral-700">•</div>
                <div class="flex flex-col items-center">
                    <span class="text-sm font-medium">ხარისხი</span>
                </div>
                <div class="text-neutral-700">•</div>
                <div class="flex flex-col items-center">
                    <span class="text-sm font-medium">ელეგანტურობა</span>
                </div>
            </div>
        </div>

        <div class="text-neutral-600 text-sm">
            &copy; 2026 Leparfum.ge. ყველა უფლება დაცულია.
        </div>
    </div>
</body>
</html>
